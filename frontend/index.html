<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pod</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23d4910a' width='100' height='100' rx='4'/><text y='72' x='16' font-size='62' fill='%23111' font-family='monospace' font-weight='bold'>P</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       Reset & Design Tokens
       ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #0e0e0e;
      --bg-1: #161616;
      --bg-2: #1e1e1e;
      --bg-3: #282828;
      --text-0: #d4d4d4;
      --text-1: #909090;
      --text-2: #585858;
      --amber: #d4910a;
      --amber-bright: #eba42a;
      --amber-dim: #7a5508;
      --border: #2a2a2a;
      --error: #c44040;
      --font-mono: 'IBM Plex Mono', 'Menlo', monospace;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg-0);
      color: var(--text-0);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Amber indicator strip at the very top */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--amber);
      z-index: 200;
    }

    /* Subtle CRT scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #app { height: 100%; }

    a { color: inherit; text-decoration: none; }

    /* ================================================================
       Shared Components
       ================================================================ */
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-2);
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg-0);
      border: 1px solid var(--border);
      color: var(--text-0);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--amber-dim); }

    .btn {
      padding: 8px 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--amber);
      border-color: var(--amber);
      color: #000;
    }
    .btn-primary:hover { background: var(--amber-bright); border-color: var(--amber-bright); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text-1);
    }
    .btn-secondary:hover { border-color: var(--text-2); color: var(--text-0); }

    .empty-state, .loading-state {
      text-align: center;
      padding: 48px 0;
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      font-family: var(--font-mono);
      margin-top: 8px;
    }

    /* ================================================================
       Auth Screen
       ================================================================ */
    .auth-container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      border: 1px solid var(--border);
      background: var(--bg-1);
    }

    .auth-header {
      padding: 24px 24px 0;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--amber);
    }

    .auth-tabs {
      display: flex;
      padding: 16px 24px 0;
      gap: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .auth-tab {
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text-2);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .auth-tab:hover { color: var(--text-1); }
    .auth-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

    .auth-form { padding: 20px 24px 24px; }
    .auth-form .form-group { margin-bottom: 14px; }
    .auth-form .btn { width: 100%; }

    /* ================================================================
       App Layout
       ================================================================ */
    .app-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-1);
      flex-shrink: 0;
    }

    .app-logo {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 4px;
      color: var(--amber);
      cursor: pointer;
    }

    .app-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .app-username { color: var(--text-2); }

    .logout-btn {
      color: var(--text-2);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
      background: none;
      border: none;
      font-family: var(--font-mono);
    }
    .logout-btn:hover { color: var(--text-0); }

    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .app-content.has-player { padding-bottom: 96px; }

    /* ================================================================
       Dashboard
       ================================================================ */
    .add-feed-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .add-feed-bar .form-input { flex: 1; }

    .dashboard-stack {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .dashboard-panel {
      border: 1px solid var(--border);
      background: var(--bg-1);
      padding: 18px;
    }

    .dashboard-panel-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .dashboard-panel-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-0);
    }

    .dashboard-panel-copy {
      font-size: 12px;
      color: var(--text-2);
      max-width: 560px;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .search-bar .form-input { flex: 1; }

    .search-results {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .search-result-card {
      border: 1px solid var(--border);
      background: var(--bg-0);
      display: flex;
      gap: 12px;
      padding: 12px;
      min-height: 116px;
    }

    .search-result-card img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      background: var(--bg-2);
      flex-shrink: 0;
    }

    .search-result-info {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .search-result-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 3px;
    }

    .search-result-artist {
      font-size: 12px;
      color: var(--text-1);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .search-result-actions {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .search-result-status {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .search-empty {
      margin-top: 16px;
      padding: 20px;
      border: 1px dashed var(--border);
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 12px;
      text-align: center;
    }

    .search-error {
      margin-top: 12px;
    }

    .podcast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .podcast-card {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-1);
      transition: border-color 0.15s;
      overflow: hidden;
    }
    .podcast-card:hover { border-color: var(--amber-dim); }

    .podcast-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--bg-2);
    }

    .podcast-card-info { padding: 10px; }

    .podcast-card-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .podcast-card-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-2);
      margin-top: 4px;
    }

    /* ================================================================
       Podcast Detail
       ================================================================ */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
      padding: 0;
    }
    .back-btn:hover { color: var(--amber); }

    .podcast-header {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .podcast-header img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-2);
    }

    .podcast-header-info { flex: 1; min-width: 0; }

    .podcast-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .podcast-description {
      font-size: 13px;
      color: var(--text-1);
      line-height: 1.6;
      max-height: 80px;
      overflow: hidden;
    }

    .episode-list { list-style: none; }

    .episode-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .episode-play-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--amber);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .episode-play-btn:hover { background: var(--amber); color: #000; }
    .episode-play-btn.playing { background: var(--amber); color: #000; }
    .episode-play-btn svg { width: 14px; height: 14px; }

    .episode-info { flex: 1; min-width: 0; }

    .episode-title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .episode-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .episode-meta {
      display: flex;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
      flex-shrink: 0;
    }

    .episode-progress-bar {
      margin-top: 6px;
      height: 3px;
      background: var(--bg-3);
      width: 100%;
      max-width: 200px;
    }

    .episode-progress-fill {
      height: 100%;
      background: var(--amber-dim);
    }

    .episode-done-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
    }

    .load-more-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      text-align: center;
    }

    /* ================================================================
       Player Bar
       ================================================================ */
    .player-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-1);
      border-top: 1px solid var(--border);
      z-index: 50;
      transform: translateY(100%);
      transition: transform 0.2s ease;
    }
    .player-bar.visible { transform: translateY(0); }

    .player-seek {
      height: 4px;
      background: var(--bg-3);
      cursor: pointer;
      position: relative;
    }

    .player-seek-fill {
      height: 100%;
      background: var(--amber);
      width: 0%;
      position: relative;
    }

    .player-seek-fill::after {
      content: '';
      position: absolute;
      right: -5px; top: -3px;
      width: 10px; height: 10px;
      background: var(--amber-bright);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .player-seek:hover .player-seek-fill::after { opacity: 1; }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 24px;
      height: 64px;
    }

    .player-thumb {
      width: 44px; height: 44px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-2);
    }

    .player-info { flex: 1; min-width: 0; }

    .player-ep-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-pod-name {
      font-size: 11px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .player-pod-name:hover { color: var(--amber); }

    .player-transport {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .player-skip {
      background: none;
      border: none;
      color: var(--text-1);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 6px;
      transition: color 0.15s;
    }
    .player-skip:hover { color: var(--text-0); }

    .player-main-btn {
      width: 36px; height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--amber);
      color: #000;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .player-main-btn:hover { background: var(--amber-bright); }
    .player-main-btn svg { width: 16px; height: 16px; }

    .player-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-2);
      white-space: nowrap;
      min-width: 100px;
      text-align: right;
    }

    /* ================================================================
       Responsive
       ================================================================ */
    @media (max-width: 640px) {
      .dashboard-panel { padding: 14px; }
      .dashboard-panel-header { flex-direction: column; align-items: flex-start; }
      .search-bar, .add-feed-bar { flex-direction: column; }
      .search-results { grid-template-columns: 1fr; }
      .podcast-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }
      .podcast-header { flex-direction: column; align-items: center; text-align: center; }
      .podcast-header img { width: 100px; height: 100px; }
      .player-controls { padding: 8px 16px; gap: 10px; }
      .player-time { display: none; }
      .app-content { padding: 16px; }
      .episode-title-row { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  // ==================================================================
  // Icons (inline SVG)
  // ==================================================================

  const ICON_PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="7,4 21,12 7,20"/></svg>';
  const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="5" height="16"/><rect x="14" y="4" width="5" height="16"/></svg>';

  // ==================================================================
  // State
  // ==================================================================

  const API = '/api/v1';
  const APPLE_SEARCH_API = 'https://itunes.apple.com/search';
  const PROGRESS_INTERVAL = 15000;
  const SEARCH_DEBOUNCE_MS = 350;
  const SEARCH_MIN_CHARS = 2;
  const SEARCH_LIMIT = 12;

  const state = {
    token: localStorage.getItem('pod_token'),
    username: localStorage.getItem('pod_username') || '',
    podcasts: [],
    currentPodcast: null,
    episodes: [],
    nextPageToken: null,
    player: { item: null, podcast: null, playing: false },
    searchQuery: '',
    searchResults: [],
    searchLoading: false,
    searchError: '',
    searchHasSearched: false,
    subscribingFeedUrl: '',
  };

  const audio = new Audio();
  let progressTimer = null;
  let lastSavedProgress = -1;
  let searchDebounceTimer = null;
  let searchAbortController = null;
  let lastSearchRequestId = 0;

  // ==================================================================
  // Utilities
  // ==================================================================

  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function stripHtml(html) {
    if (!html) return '';
    const doc = new DOMParser().parseFromString(html, 'text/html');
    return doc.body.textContent || '';
  }

  function formatDuration(secs) {
    if (!secs || secs <= 0) return '0:00';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    return m + ':' + String(s).padStart(2, '0');
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
  }

  function $(sel) { return document.querySelector(sel); }

  function cancelSearchRequest() {
    if (searchAbortController) {
      searchAbortController.abort();
      searchAbortController = null;
    }
  }

  function resetSearchState() {
    state.searchResults = [];
    state.searchLoading = false;
    state.searchError = '';
    state.searchHasSearched = false;
    state.subscribingFeedUrl = '';
    if (searchDebounceTimer) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = null;
    }
    cancelSearchRequest();
  }

  function isSubscribedToFeed(feedUrl) {
    return state.podcasts.some(p => p.feed_url === feedUrl);
  }

  function formatAppleSearchResult(result) {
    return {
      trackId: result.trackId,
      trackName: result.trackName || result.collectionName || 'Untitled Podcast',
      artistName: result.artistName || 'Unknown creator',
      feedUrl: result.feedUrl,
      artworkUrl: result.artworkUrl600 || result.artworkUrl100 || result.artworkUrl60 || '',
      primaryGenreName: result.primaryGenreName || '',
      releaseDate: result.releaseDate || '',
    };
  }

  async function fetchApplePodcastSearch(query) {
    const requestId = ++lastSearchRequestId;
    cancelSearchRequest();
    searchAbortController = new AbortController();

    state.searchLoading = true;
    state.searchError = '';
    renderSearchResults();

    const url = new URL(APPLE_SEARCH_API);
    url.searchParams.set('media', 'podcast');
    url.searchParams.set('entity', 'podcast');
    url.searchParams.set('limit', String(SEARCH_LIMIT));
    url.searchParams.set('term', query);

    try {
      const res = await fetch(url.toString(), {
        method: 'GET',
        signal: searchAbortController.signal,
      });

      if (!res.ok) throw new Error('Apple search failed');

      const data = await res.json();
      if (requestId !== lastSearchRequestId) return;

      state.searchResults = (data.results || [])
        .filter(item => item && item.feedUrl)
        .map(formatAppleSearchResult);
      state.searchHasSearched = true;
      state.searchLoading = false;
      state.searchError = '';
      searchAbortController = null;
      renderSearchResults();
    } catch (err) {
      if (err.name === 'AbortError') return;
      if (requestId !== lastSearchRequestId) return;
      state.searchLoading = false;
      state.searchHasSearched = true;
      state.searchResults = [];
      state.searchError = 'Apple podcast search is unavailable right now.';
      searchAbortController = null;
      renderSearchResults();
    }
  }

  function queueApplePodcastSearch(query) {
    state.searchQuery = query;
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);

    if (query.length < SEARCH_MIN_CHARS) {
      resetSearchState();
      renderSearchResults();
      return;
    }

    searchDebounceTimer = setTimeout(() => {
      searchDebounceTimer = null;
      fetchApplePodcastSearch(query);
    }, SEARCH_DEBOUNCE_MS);
  }

  // ==================================================================
  // API Client
  // ==================================================================

  async function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;

    const res = await fetch(API + path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });

    if (res.status === 401) {
      doLogout();
      throw new Error('Session expired');
    }

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Request failed' }));
      throw new Error(err.error || 'Request failed');
    }

    const ct = res.headers.get('content-type') || '';
    if (ct.includes('json')) return res.json();
    return null;
  }

  // ==================================================================
  // Auth
  // ==================================================================

  let authMode = 'signin';

  function renderAuth() {
    const root = $('#app');
    root.innerHTML = `
      <div class="auth-container">
        <div class="auth-box">
          <div class="auth-header">POD</div>
          <div class="auth-tabs">
            <div class="auth-tab ${authMode === 'signin' ? 'active' : ''}" data-mode="signin">Sign In</div>
            <div class="auth-tab ${authMode === 'register' ? 'active' : ''}" data-mode="register">Register</div>
          </div>
          <form class="auth-form" id="auth-form">
            <div class="form-group">
              <label class="form-label">Username</label>
              <input class="form-input" type="text" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input class="form-input" type="password" name="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary" type="submit" id="auth-submit">
              ${authMode === 'signin' ? 'Sign In' : 'Register'}
            </button>
            <div class="error-msg" id="auth-error"></div>
          </form>
        </div>
      </div>`;

    // Bind tab clicks
    root.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        authMode = tab.dataset.mode;
        renderAuth();
        // Focus the username input after re-render
        const input = root.querySelector('input[name="username"]');
        if (input) input.focus();
      });
    });

    // Bind form submission
    $('#auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const username = form.username.value.trim();
      const password = form.password.value;
      const btn = $('#auth-submit');
      const errEl = $('#auth-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const endpoint = authMode === 'signin' ? '/auth/login' : '/auth/register';
        const data = await api('POST', endpoint, { username, password });
        state.token = data.token;
        state.username = username;
        localStorage.setItem('pod_token', data.token);
        localStorage.setItem('pod_username', username);
        renderApp();
        navigate('#/');
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = authMode === 'signin' ? 'Sign In' : 'Register';
      }
    });
  }

  function doLogout() {
    // Fire-and-forget logout call
    if (state.token) api('POST', '/auth/logout').catch(() => {});
    resetSearchState();
    state.searchQuery = '';
    state.token = null;
    state.username = '';
    state.podcasts = [];
    state.currentPodcast = null;
    state.episodes = [];
    state.player = { item: null, podcast: null, playing: false };
    audio.pause();
    audio.src = '';
    stopProgressTimer();
    localStorage.removeItem('pod_token');
    localStorage.removeItem('pod_username');
    authMode = 'signin';
    renderAuth();
  }

  // ==================================================================
  // App Shell
  // ==================================================================

  function renderApp() {
    const root = $('#app');
    root.innerHTML = `
      <div class="app-layout">
        <header class="app-header">
          <div class="app-logo" id="go-home">POD</div>
          <div class="app-header-right">
            <span class="app-username">${esc(state.username)}</span>
            <button class="logout-btn" id="logout-btn">Logout</button>
          </div>
        </header>
        <main class="app-content" id="content">
          <div class="loading-state">LOADING...</div>
        </main>
        <div class="player-bar" id="player-bar">
          <div class="player-seek" id="player-seek">
            <div class="player-seek-fill" id="player-seek-fill"></div>
          </div>
          <div class="player-controls">
            <img class="player-thumb" id="player-thumb" src="" alt="">
            <div class="player-info">
              <div class="player-ep-title" id="player-ep-title"></div>
              <div class="player-pod-name" id="player-pod-name"></div>
            </div>
            <div class="player-transport">
              <button class="player-skip" id="skip-back">&minus;15s</button>
              <button class="player-main-btn" id="play-pause">${ICON_PLAY}</button>
              <button class="player-skip" id="skip-fwd">+30s</button>
            </div>
            <div class="player-time" id="player-time">0:00 / 0:00</div>
          </div>
        </div>
      </div>`;

    $('#logout-btn').addEventListener('click', doLogout);
    $('#go-home').addEventListener('click', () => navigate('#/'));
    $('#play-pause').addEventListener('click', togglePlayPause);
    $('#skip-back').addEventListener('click', () => skip(-15));
    $('#skip-fwd').addEventListener('click', () => skip(30));
    $('#player-seek').addEventListener('click', seekTo);
    $('#player-pod-name').addEventListener('click', () => {
      if (state.player.podcast) navigate('#/podcast/' + state.player.podcast.id);
    });

    updatePlayerBar();
  }

  function getContent() { return $('#content'); }

  function updateContentPadding() {
    const c = getContent();
    if (!c) return;
    if (state.player.item) c.classList.add('has-player');
    else c.classList.remove('has-player');
  }

  // ==================================================================
  // Dashboard View
  // ==================================================================

  async function renderDashboard() {
    const c = getContent();
    if (!c) return;
    c.innerHTML = `
      <div class="dashboard-stack">
        <section class="dashboard-panel">
          <div class="section-label">Find Podcasts</div>
          <div class="dashboard-panel-header">
            <div>
              <div class="dashboard-panel-title">Search Apple Podcasts</div>
              <div class="dashboard-panel-copy">Start typing a show or creator name. Selecting a result subscribes immediately using the feed Apple publishes.</div>
            </div>
          </div>
          <div class="search-bar">
            <input class="form-input" type="search" id="podcast-search-input"
                   placeholder="Search by title or creator" autocomplete="off" spellcheck="false">
          </div>
          <div id="search-error" class="search-error"></div>
          <div id="search-results"></div>
        </section>

        <section class="dashboard-panel">
          <div class="section-label">Add Feed</div>
          <div class="dashboard-panel-header">
            <div>
              <div class="dashboard-panel-title">Add By RSS URL</div>
              <div class="dashboard-panel-copy">Use this when you already know the feed URL or the podcast is not discoverable in Apple search.</div>
            </div>
          </div>
          <div class="add-feed-bar">
            <input class="form-input" type="url" id="feed-url-input"
                   placeholder="https://example.com/feed.xml">
            <button class="btn btn-primary" id="add-feed-btn">Add</button>
          </div>
          <div id="add-feed-error"></div>
        </section>

        <section>
          <div class="section-label">Your Subscriptions</div>
          <div id="podcast-list"><div class="loading-state">LOADING...</div></div>
        </section>
      </div>`;

    updateContentPadding();

    const searchInput = $('#podcast-search-input');
    // Bind add-feed
    const feedInput = $('#feed-url-input');
    const addBtn = $('#add-feed-btn');

    searchInput.value = state.searchQuery;
    searchInput.addEventListener('input', (e) => {
      queueApplePodcastSearch(e.target.value.trim());
    });

    async function doAdd() {
      const url = feedInput.value.trim();
      if (!url) return;
      addBtn.disabled = true;
      addBtn.textContent = '...';
      $('#add-feed-error').innerHTML = '';
      try {
        await api('POST', '/podcasts', { feed_url: url });
        feedInput.value = '';
        await loadPodcasts();
        renderSearchResults();
        renderPodcastGrid();
      } catch (err) {
        $('#add-feed-error').innerHTML = '<div class="error-msg">' + esc(err.message) + '</div>';
      }
      addBtn.disabled = false;
      addBtn.textContent = 'Add';
    }

    addBtn.addEventListener('click', doAdd);
    feedInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doAdd(); });

    // Load podcasts
    try {
      await loadPodcasts();
      renderSearchResults();
      renderPodcastGrid();
    } catch (err) {
      $('#podcast-list').innerHTML = '<div class="error-msg">' + esc(err.message) + '</div>';
    }
  }

  async function loadPodcasts() {
    state.podcasts = await api('GET', '/podcasts');
  }

  function renderPodcastGrid() {
    const el = $('#podcast-list');
    if (!el) return;

    if (state.podcasts.length === 0) {
      el.innerHTML = '<div class="empty-state">No subscriptions yet.<br>Add a podcast feed above to get started.</div>';
      return;
    }

    el.innerHTML = '<div class="podcast-grid">' + state.podcasts.map(p => `
      <div class="podcast-card" data-id="${esc(p.id)}">
        <img src="${esc(p.image_link)}" alt="" loading="lazy"
             onerror="this.style.display='none'">
        <div class="podcast-card-info">
          <div class="podcast-card-title">${esc(p.title)}</div>
          <div class="podcast-card-date">${p.last_publication_date ? formatDate(p.last_publication_date) : 'No episodes'}</div>
        </div>
      </div>
    `).join('') + '</div>';

    el.querySelectorAll('.podcast-card').forEach(card => {
      card.addEventListener('click', () => navigate('#/podcast/' + card.dataset.id));
    });
  }

  function renderSearchResults() {
    const errorEl = $('#search-error');
    const resultsEl = $('#search-results');
    if (!errorEl || !resultsEl) return;

    errorEl.innerHTML = state.searchError
      ? '<div class="error-msg">' + esc(state.searchError) + '</div>'
      : '';

    if (state.searchQuery.length < SEARCH_MIN_CHARS) {
      const remaining = SEARCH_MIN_CHARS - state.searchQuery.length;
      resultsEl.innerHTML = '<div class="search-empty">Type ' + remaining + ' more character' + (remaining === 1 ? '' : 's') + ' to search Apple Podcasts.</div>';
      return;
    }

    if (state.searchLoading) {
      resultsEl.innerHTML = '<div class="loading-state">SEARCHING APPLE PODCASTS...</div>';
      return;
    }

    if (state.searchResults.length === 0) {
      const msg = state.searchHasSearched
        ? 'No podcast matches found for this search.'
        : 'Search results will appear here.';
      resultsEl.innerHTML = '<div class="search-empty">' + esc(msg) + '</div>';
      return;
    }

    resultsEl.innerHTML = '<div class="search-results">' + state.searchResults.map(result => {
      const subscribed = isSubscribedToFeed(result.feedUrl);
      const busy = state.subscribingFeedUrl === result.feedUrl;
      const actionLabel = busy ? '...' : (subscribed ? 'Added' : 'Subscribe');
      const meta = [
        result.primaryGenreName ? esc(result.primaryGenreName) : '',
        result.releaseDate ? esc(formatDate(result.releaseDate)) : '',
      ].filter(Boolean).map(value => '<span>' + value + '</span>').join('');

      return `
        <div class="search-result-card">
          <img src="${esc(result.artworkUrl)}" alt="" loading="lazy"
               onerror="this.style.display='none'">
          <div class="search-result-info">
            <div class="search-result-title">${esc(result.trackName)}</div>
            <div class="search-result-artist">${esc(result.artistName)}</div>
            <div class="search-result-meta">${meta}</div>
            <div class="search-result-actions">
              <span class="search-result-status">${subscribed ? 'In Library' : 'Feed Ready'}</span>
              <button class="btn ${subscribed ? 'btn-secondary' : 'btn-primary'} search-subscribe-btn"
                      data-feed-url="${esc(result.feedUrl)}"
                      ${subscribed || busy ? 'disabled' : ''}>
                ${actionLabel}
              </button>
            </div>
          </div>
        </div>`;
    }).join('') + '</div>';

    resultsEl.querySelectorAll('.search-subscribe-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const feedUrl = btn.dataset.feedUrl;
        if (!feedUrl || state.subscribingFeedUrl) return;

        state.subscribingFeedUrl = feedUrl;
        state.searchError = '';
        renderSearchResults();

        try {
          await api('POST', '/podcasts', { feed_url: feedUrl });
          await loadPodcasts();
          state.subscribingFeedUrl = '';
          renderSearchResults();
          renderPodcastGrid();
        } catch (err) {
          state.subscribingFeedUrl = '';
          state.searchError = err.message;
          renderSearchResults();
        }
      });
    });
  }

  // ==================================================================
  // Podcast Detail View
  // ==================================================================

  async function renderPodcastView(podcastId) {
    const c = getContent();
    if (!c) return;
    c.innerHTML = '<div class="loading-state">LOADING...</div>';
    updateContentPadding();

    try {
      state.currentPodcast = await api('GET', '/podcasts/' + encodeURIComponent(podcastId));
      state.episodes = [];
      state.nextPageToken = null;
      await loadMoreEpisodes(podcastId);
      renderPodcastDetail();
    } catch (err) {
      c.innerHTML = `
        <button class="back-btn" id="back-btn">&larr; Back</button>
        <div class="error-msg">${esc(err.message)}</div>`;
      $('#back-btn').addEventListener('click', () => navigate('#/'));
    }
  }

  async function loadMoreEpisodes(podcastId) {
    let url = '/podcasts/' + encodeURIComponent(podcastId) + '/episodes?per_page=30';
    if (state.nextPageToken) url += '&page_token=' + encodeURIComponent(state.nextPageToken);

    const data = await api('GET', url);
    state.episodes = state.episodes.concat(data.items);
    state.nextPageToken = data.next_page_token || null;
  }

  function renderPodcastDetail() {
    const c = getContent();
    if (!c || !state.currentPodcast) return;
    const p = state.currentPodcast;

    c.innerHTML = `
      <button class="back-btn" id="back-btn">&larr; Back</button>
      <div class="podcast-header">
        <img src="${esc(p.image_link)}" alt="" onerror="this.style.display='none'">
        <div class="podcast-header-info">
          <div class="podcast-title">${esc(p.title)}</div>
          <div class="podcast-description">${esc(stripHtml(p.description))}</div>
        </div>
      </div>
      <div class="section-label">Episodes</div>
      <ul class="episode-list" id="episode-list"></ul>
      <div id="load-more-container"></div>`;

    $('#back-btn').addEventListener('click', () => navigate('#/'));
    renderEpisodeList();
    updateContentPadding();
  }

  function renderEpisodeList() {
    const list = $('#episode-list');
    if (!list) return;

    list.innerHTML = state.episodes.map(item => {
      const ep = item.episode;
      const isActive = state.player.item && state.player.item.episode.id === ep.id;
      const isPlaying = isActive && state.player.playing;
      const pct = (item.progress && ep.audio_duration > 0)
        ? Math.round((item.progress / ep.audio_duration) * 100) : 0;
      const isDone = pct >= 95;

      let progressHtml = '';
      if (isDone) {
        progressHtml = '<div class="episode-done-label">Done</div>';
      } else if (pct > 0) {
        progressHtml = `
          <div class="episode-progress-bar">
            <div class="episode-progress-fill" style="width:${pct}%"></div>
          </div>`;
      }

      return `
        <li class="episode-item">
          <button class="episode-play-btn ${isPlaying ? 'playing' : ''}" data-idx="${state.episodes.indexOf(item)}">
            ${isPlaying ? ICON_PAUSE : ICON_PLAY}
          </button>
          <div class="episode-info">
            <div class="episode-title-row">
              <div class="episode-title">${esc(ep.title)}</div>
              <div class="episode-meta">
                <span>${formatDate(ep.publication_date)}</span>
                <span>${formatDuration(ep.audio_duration)}</span>
              </div>
            </div>
            ${progressHtml}
          </div>
        </li>`;
    }).join('');

    // Bind play buttons
    list.querySelectorAll('.episode-play-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx, 10);
        const item = state.episodes[idx];
        if (!item) return;
        const isActive = state.player.item && state.player.item.episode.id === item.episode.id;
        if (isActive && state.player.playing) {
          pauseAudio();
        } else if (isActive) {
          resumeAudio();
        } else {
          playEpisode(item, state.currentPodcast);
        }
      });
    });

    // Load more button
    const container = $('#load-more-container');
    if (container) {
      if (state.nextPageToken) {
        container.innerHTML = '<button class="btn btn-secondary load-more-btn" id="load-more-btn">Load More</button>';
        $('#load-more-btn').addEventListener('click', async () => {
          const btn = $('#load-more-btn');
          btn.disabled = true;
          btn.textContent = '...';
          try {
            await loadMoreEpisodes(state.currentPodcast.id);
            renderEpisodeList();
          } catch (err) {
            btn.textContent = 'Error - Retry';
            btn.disabled = false;
          }
        });
      } else {
        container.innerHTML = '';
      }
    }
  }

  // ==================================================================
  // Audio Player
  // ==================================================================

  function playEpisode(item, podcast) {
    // Save progress for the previously playing episode before switching
    if (state.player.item && state.player.playing) saveProgress();

    state.player = { item, podcast, playing: true };
    lastSavedProgress = -1;
    audio.src = item.episode.audio_url;

    const seekTarget = item.progress || 0;
    if (seekTarget > 0) {
      audio.addEventListener('loadeddata', function handler() {
        audio.currentTime = seekTarget;
        audio.removeEventListener('loadeddata', handler);
      });
    }

    audio.play().catch(() => {});
    startProgressTimer();
    updatePlayerBar();
    refreshEpisodeListIfVisible();
  }

  function pauseAudio() {
    audio.pause();
    state.player.playing = false;
    stopProgressTimer();
    saveProgress();
    updatePlayerBar();
    refreshEpisodeListIfVisible();
  }

  function resumeAudio() {
    audio.play().catch(() => {});
    state.player.playing = true;
    startProgressTimer();
    updatePlayerBar();
    refreshEpisodeListIfVisible();
  }

  function togglePlayPause() {
    if (!state.player.item) return;
    if (state.player.playing) pauseAudio();
    else resumeAudio();
  }

  function skip(secs) {
    if (!state.player.item) return;
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + secs));
  }

  function seekTo(e) {
    if (!state.player.item || !audio.duration) return;
    const bar = e.currentTarget;
    const rect = bar.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.currentTime = ratio * audio.duration;
  }

  function updatePlayerBar() {
    const bar = $('#player-bar');
    if (!bar) return;

    if (state.player.item) {
      bar.classList.add('visible');
      const ep = state.player.item.episode;
      const thumb = ep.thumbnail_url || (state.player.podcast ? state.player.podcast.image_link : '');
      $('#player-thumb').src = thumb || '';
      $('#player-ep-title').textContent = ep.title;
      $('#player-pod-name').textContent = state.player.podcast ? state.player.podcast.title : '';
      $('#play-pause').innerHTML = state.player.playing ? ICON_PAUSE : ICON_PLAY;
    } else {
      bar.classList.remove('visible');
    }
    updateContentPadding();
  }

  function updatePlayerTime() {
    const fill = $('#player-seek-fill');
    const timeEl = $('#player-time');
    if (!fill || !timeEl) return;
    if (!state.player.item) return;

    const current = audio.currentTime || 0;
    const duration = audio.duration || state.player.item.episode.audio_duration || 0;
    const pct = duration > 0 ? (current / duration) * 100 : 0;
    fill.style.width = pct + '%';
    timeEl.textContent = formatDuration(current) + ' / ' + formatDuration(duration);
  }

  // Progress auto-save
  function startProgressTimer() {
    stopProgressTimer();
    progressTimer = setInterval(saveProgress, PROGRESS_INTERVAL);
  }

  function stopProgressTimer() {
    if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  }

  async function saveProgress() {
    if (!state.player.item) return;
    const progress = Math.floor(audio.currentTime);
    if (progress === lastSavedProgress) return;
    lastSavedProgress = progress;

    const done = audio.duration > 0 && (audio.duration - audio.currentTime < 30);
    const epId = state.player.item.episode.id;
    try {
      await api('POST', '/episodes/' + encodeURIComponent(epId) + '/progress', { progress, done });
      // Update local state so the episode list reflects progress without refetching
      if (state.player.item) state.player.item.progress = progress;
    } catch (_) { /* best-effort */ }
  }

  function refreshEpisodeListIfVisible() {
    // Re-render episode list if we're on the podcast detail page
    const list = $('#episode-list');
    if (list) renderEpisodeList();
  }

  // Audio events
  audio.addEventListener('timeupdate', updatePlayerTime);
  audio.addEventListener('play', () => {
    state.player.playing = true;
    updatePlayerBar();
    refreshEpisodeListIfVisible();
  });
  audio.addEventListener('pause', () => {
    state.player.playing = false;
    updatePlayerBar();
    refreshEpisodeListIfVisible();
  });
  audio.addEventListener('ended', () => {
    stopProgressTimer();
    saveProgress();
    state.player.playing = false;
    updatePlayerBar();
    refreshEpisodeListIfVisible();
  });

  // Save on tab close
  window.addEventListener('beforeunload', () => {
    if (state.player.item) saveProgress();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (!state.player.item) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlayPause(); }
    else if (e.code === 'ArrowLeft') { e.preventDefault(); skip(-15); }
    else if (e.code === 'ArrowRight') { e.preventDefault(); skip(30); }
  });

  // ==================================================================
  // Router
  // ==================================================================

  function navigate(hash) { window.location.hash = hash; }

  function getRoute() {
    const hash = window.location.hash.slice(1) || '/';
    const podcastMatch = hash.match(/^\/podcast\/(.+)$/);
    if (podcastMatch) return { view: 'podcast', id: decodeURIComponent(podcastMatch[1]) };
    return { view: 'dashboard' };
  }

  async function route() {
    if (!state.token) { renderAuth(); return; }
    // Ensure app shell exists
    if (!$('#content')) renderApp();

    const r = getRoute();
    if (r.view === 'podcast') await renderPodcastView(r.id);
    else await renderDashboard();
  }

  window.addEventListener('hashchange', route);

  // ==================================================================
  // Init
  // ==================================================================

  if (state.token) {
    renderApp();
    route();
  } else {
    renderAuth();
  }

})();
</script>
</body>
