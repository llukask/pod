{% extends "skel.html" %}

{% block title %}Register - Pod{% endblock %}

{% block content %}
<div class="m-4 flex flex-col items-center pt-16">
  <h1 class="text-2xl font-bold mb-6">Register</h1>

  {% if let Some(msg) = error %}
  <p class="text-red-600 dark:text-red-400 mb-4">{{ msg }}</p>
  {% endif %}

  <form action="/auth/register" method="post" class="w-full max-w-sm flex flex-col gap-4">
    <input
      type="text"
      name="username"
      placeholder="Username"
      required
      autocomplete="username"
      class="rounded border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
    />
    <input
      type="password"
      name="password"
      placeholder="Password"
      required
      autocomplete="new-password"
      class="rounded border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
    />
    <button
      type="submit"
      class="rounded bg-slate-800 px-4 py-2 text-white dark:bg-slate-200 dark:text-slate-900"
    >
      Register
    </button>
  </form>

  <p class="mt-4 text-sm text-slate-500">
    Already have an account?
    <a href="/auth/login" class="underline">Log in</a>
  </p>
</div>
{% endblock %}
